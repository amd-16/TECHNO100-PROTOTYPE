<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHNO PROTOTYPE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1 class="clickable" onclick="document.getElementById('dictionaryFrame').src='https://www.webonary.org/kankanaey/';">
        Kankanaey Dictionary
    </h1>
    <div class="iframe-container dictionary-container">
        <iframe
            id="dictionaryFrame" 
            src="https://www.webonary.org/kankanaey/" 
            scrolling="no"
            title="Kankanaey Dictionary">
        </iframe>
    </div>

    <h1 class="clickable" onclick="document.getElementById('translatorFrame').src='https://translatormind.com/translator-tool/kankanaey-translator';">
        English to Kankanaey Translator
    </h1>
    <div class="iframe-container translator-container">
        <iframe
            id="translatorFrame"  
            src="https://translatormind.com/translator-tool/kankanaey-translator" 
            scrolling="no"
            title="Kankanaey Translator">
        </iframe>
    </div>

</body>
</html>
